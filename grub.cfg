# DEVICE DETAILS: /dev/sda4 PARTUUID=8944034d-58d0-47d1-af63-934209c14c46 PARTLABEL=SWAP UUID= LABEL=SWAP
# DEVICE DETAILS: /dev/sda5 PARTUUID=c9857795-a2cf-4fe4-81d5-8fdb588e67ad PARTLABEL=ARCH_LINUX_ROOT UUID=94797f65-f65a-4b7f-bd96-b8890fa2a933 LABEL=ARCH_ROOT
# (0) ZielonyOS
menuentry "ZielonyOS" {
    set gfxpayload="keep"
    search --fs-uuid --no-floppy --set=root --hint-bios=hd0,gpt3 --hint-efi=hd0,gpt3 --hint-baremetal=ahci0,gpt3  063A-3662
    linux /vmlinuz-linux root=PARTUUID=c9857795-a2cf-4fe4-81d5-8fdb588e67ad rootfstype=xfs rw rootflags=rw,relatime,inode64,logbufs=8,logbsize=32k,noquota 
    initrd /initramfs-linux.img

}
if [ "${grub_platform}" == "efi" ]; then
    if [ "${grub_cpu}" == "x86_64" ]; then
        ## (2) Microsoft Windows 10/11 via x86_64 UEFI
        #menuentry Microsoft Windows 10/11 x86_64 UEFI-GPT {
        #    insmod part_gpt
        #    insmod fat
        #    insmod search_fs_uuid
        #    insmod chain
        #    search --fs-uuid --no-floppy --set=root --hint-bios=hd0,gpt2 --hint-efi=hd0,gpt2 --hint-baremetal=ahci0,gpt2  0633-0A88
        #    chainloader /EFI/Microsoft/Boot/bootmgfw.efi
        #}
    fi
fi
if [ "${grub_platform}" == "efi" ]; then
    menuentry "UEFI Firmware Setup" {
        fwsetup
        }
fi
menuentry "Reboot System" {
    reboot
}
menuentry "Poweroff System" {
    halt
}
