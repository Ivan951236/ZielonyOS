# Include modules - required for boot
insmod part_gpt
insmod part_msdos
insmod fat
insmod fat
insmod xfs
insmod xfs
insmod search_fs_file
insmod search_fs_uuid
insmod search_label
insmod linux
insmod chain
set pager=1
# set debug="all"
set locale_dir="${prefix}/locale"
if [ "${grub_platform}" == "efi" ]; then
    insmod all_video
    insmod efi_gop
    if [ "${grub_cpu}" == "x86_64" ]; then
        insmod bli
        insmod efi_uga
    elif [ "${grub_cpu}" == "i386" ]; then
        insmod bli
        insmod efi_uga
    fi
elif [ "${grub_platform}" == "pc" ]; then
    insmod vbe
    insmod vga
    insmod png
fi
insmod video_bochs
insmod video_cirrus
insmod font
search --fs-uuid --no-floppy --set=usr_part --hint-bios=hd0,gpt5 --hint-efi=hd0,gpt5 --hint-baremetal=ahci0,gpt5  94797f65-f65a-4b7f-bd96-b8890fa2a933
search --fs-uuid --no-floppy --set=root_part --hint-bios=hd0,gpt5 --hint-efi=hd0,gpt5 --hint-baremetal=ahci0,gpt5  94797f65-f65a-4b7f-bd96-b8890fa2a933
if [ -e "${prefix}/fonts/ter-u16n.pf2" ]; then
    set _fontfile="${prefix}/fonts/ter-u16n.pf2"
else
    if [ -e "(${root_part})/usr/share/grub/ter-u16n.pf2" ]; then
        set _fontfile="(${root_part})/usr/share/grub/ter-u16n.pf2"
    else
        if [ -e "(${usr_part})/share/grub/ter-u16n.pf2" ]; then
            set _fontfile="(${usr_part})/share/grub/ter-u16n.pf2"
        fi
    fi
fi
if loadfont "${_fontfile}" ; then
    insmod gfxterm
    set gfxmode="auto"

    terminal_input console
    terminal_output gfxterm
fi
